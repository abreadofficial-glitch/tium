name: Apps Script 자동 배포

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read

concurrency:
  group: tium-order-app-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 소스 구문 검사
        run: node scripts/validate.mjs

      - name: clasp 설치
        run: npm install --global @google/clasp

      - name: clasp 인증 파일 생성
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          test -n "$CLASPRC_JSON" || (echo "CLASPRC_JSON secret이 없습니다." && exit 1)
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"

      - name: Apps Script 프로젝트 연결
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
        run: |
          test -n "$APPS_SCRIPT_ID" || (echo "APPS_SCRIPT_ID secret이 없습니다." && exit 1)
          printf '{"scriptId":"%s","rootDir":"src"}\n' "$APPS_SCRIPT_ID" > .clasp.json

      - name: Apps Script 코드 업로드
        run: clasp push --force

      - name: 배포 설명 생성
        id: meta
        run: echo "description=GitHub-${GITHUB_SHA::7}-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: 기존 웹앱 새 버전 배포
        env:
          APPS_SCRIPT_DEPLOYMENT_ID: ${{ secrets.APPS_SCRIPT_DEPLOYMENT_ID }}
          DEPLOY_DESCRIPTION: ${{ steps.meta.outputs.description }}
        run: |
          test -n "$APPS_SCRIPT_DEPLOYMENT_ID" || (echo "APPS_SCRIPT_DEPLOYMENT_ID secret이 없습니다." && exit 1)
          clasp create-version "$DEPLOY_DESCRIPTION"
          VERSION=$(clasp versions | tail -n 1 | sed -E 's/^([0-9]+).*/\1/')
          test -n "$VERSION" || (echo "새 Apps Script 버전을 확인할 수 없습니다." && exit 1)
          clasp update-deployment "$APPS_SCRIPT_DEPLOYMENT_ID" -V "$VERSION" -d "$DEPLOY_DESCRIPTION"
          echo "Apps Script 웹앱 배포 완료: version $VERSION"
